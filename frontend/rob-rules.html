<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#ffffff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rob's Rules Voting — Chair Dashboard</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --fw-orange: #ff6b00;
      --fw-dark: #1a1a1a;
      --fw-gray: #6b7280;
      --fw-light: #f9fafb;
      --fw-border: #e5e7eb;
      --state-created: #9ca3af;
      --state-seconded: #f59e0b;
      --state-voting: #22c55e;
      --state-passed: #10b981;
      --state-failed: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--fw-light);
      color: var(--fw-dark);
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      background: var(--fw-dark);
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header .network {
      font-size: 0.75rem;
      color: var(--fw-gray);
      background: rgba(255,255,255,0.1);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
    }
    
    /* Main Layout */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
    }
    
    /* Contract Info Bar */
    .contract-bar {
      background: #fff;
      border: 1px solid var(--fw-border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .contract-bar span { color: var(--fw-gray); }
    .contract-bar strong { color: var(--fw-dark); font-family: monospace; font-size: 0.8rem; }
    
    /* Proposal List */
    .proposals-section h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--fw-gray);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    
    .proposal-card {
      background: #fff;
      border: 2px solid var(--fw-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .proposal-card:hover { border-color: var(--fw-orange); box-shadow: 0 4px 12px rgba(255,107,0,0.1); }
    .proposal-card.selected { border-color: var(--fw-orange); border-width: 3px; }
    
    .proposal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .proposal-id {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--fw-gray);
      text-transform: uppercase;
    }
    .state-badge {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.35rem 1rem;
      border-radius: 20px;
      color: #fff;
    }
    .state-0 { background: var(--state-created); }
    .state-1 { background: var(--state-seconded); }
    .state-2 { background: var(--state-voting); }
    .state-3 { background: var(--state-passed); }
    .state-4 { background: var(--state-failed); }
    
    .proposal-desc {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--fw-dark);
      margin-bottom: 1rem;
    }
    
    .proposal-stats {
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: var(--fw-gray);
    }
    .proposal-stats strong {
      color: var(--fw-dark);
      font-weight: 700;
      font-size: 1.25rem;
    }
    
    /* State Progress Bar */
    .progress-bar {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      gap: 0;
    }
    .progress-step {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--fw-gray);
      padding: 0.75rem 0;
      border-top: 4px solid var(--fw-border);
    }
    .progress-step.active { color: var(--fw-orange); border-color: var(--fw-orange); }
    .progress-step.done { color: var(--state-passed); border-color: var(--state-passed); }
    
    /* Detail Panel */
    .detail-panel {
      background: #fff;
      border: 1px solid var(--fw-border);
      border-radius: 12px;
      padding: 1.5rem;
      position: sticky;
      top: 2rem;
    }
    .detail-panel h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .detail-meta {
      font-size: 0.85rem;
      color: var(--fw-gray);
      margin-bottom: 1.5rem;
    }
    
    /* Large Vote Counts */
    .vote-display {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .vote-cell {
      background: var(--fw-light);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .vote-cell .count {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      color: var(--fw-dark);
    }
    .vote-cell .label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--fw-gray);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .vote-cell.yes .count { color: var(--state-passed); }
    .vote-cell.no .count { color: var(--state-failed); }
    .vote-cell.abstain .count { color: var(--state-created); }
    
    /* Chair Actions — BIG BUTTONS */
    .chair-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--fw-border);
    }
    .chair-actions h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--fw-gray);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    
    .action-btn {
      width: 100%;
      padding: 1.25rem;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-btn.primary {
      background: var(--fw-orange);
      color: #fff;
    }
    .action-btn.primary:hover:not(:disabled) { background: #e55d00; transform: translateY(-1px); }
    .action-btn.secondary {
      background: var(--fw-dark);
      color: #fff;
    }
    .action-btn.secondary:hover:not(:disabled) { background: #333; }
    .action-btn.success {
      background: var(--state-passed);
      color: #fff;
    }
    .action-btn.success:hover:not(:disabled) { background: #0ea572; }
    
    /* Voter Status */
    .voter-status {
      padding: 1rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 1rem;
    }
    .voter-status.eligible { background: rgba(34, 197, 94, 0.1); color: var(--state-passed); border: 2px solid var(--state-passed); }
    .voter-status.not-eligible { background: rgba(239, 68, 68, 0.1); color: var(--state-failed); border: 2px solid var(--state-failed); }
    
    /* Input Form */
    .create-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .create-form input {
      flex: 1;
      padding: 1rem;
      border: 2px solid var(--fw-border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
    }
    .create-form input:focus { outline: none; border-color: var(--fw-orange); }
    .create-form button { padding: 1rem 2rem; }
    
    /* Amendments */
    .amendments-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--fw-border);
    }
    .amendments-section h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--fw-gray);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .amendment-item {
      background: var(--fw-light);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .amendment-item .desc { font-size: 1rem; font-weight: 500; }
    .amendment-item .status { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
    .amendment-item .status.approved { color: var(--state-passed); }
    .amendment-item .status.pending { color: var(--state-seconded); }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--fw-dark);
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--state-failed); }
    
    .hidden { display: none; }
    
    /* Responsive — on big screen keep it centered and readable */
    @media (min-width: 1200px) {
      .main { grid-template-columns: 1fr 420px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Rob's Rules Voting — Chair Dashboard</h1>
    <span class="network">Sepolia Testnet</span>
  </div>
  
  <div class="main">
    <!-- Left: Proposal List + Create -->
    <div class="proposals-area">
      <!-- Contract Info -->
      <div class="contract-bar">
        <div><span>Contract:</span> <strong id="contractAddr">0xb3254...88CaC3</strong></div>
        <div><span>Chair:</span> <strong id="chairAddr">0x6A8C...54e0</strong></div>
        <div><span>Proposals:</span> <strong id="proposalCount">0</strong></div>
      </div>
      
      <!-- Create Proposal -->
      <div class="create-form">
        <input type="text" id="newProposalText" placeholder="Enter new proposal description..." />
        <button class="action-btn primary" onclick="createProposal()">Create Proposal</button>
      </div>
      
      <!-- Proposals -->
      <div class="proposals-section">
        <h2>Active Proposals</h2>
        <div id="proposalsList">
          <div style="text-align: center; padding: 3rem; color: var(--fw-gray); font-size: 1.25rem;">
            No proposals yet. Create one above.
          </div>
        </div>
      </div>
    </div>
    
    <!-- Right: Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <h3 id="detailTitle">Select a proposal</h3>
      <p class="detail-meta" id="detailMeta"></p>
      
      <!-- State Progress -->
      <div class="progress-bar" id="progressBar">
        <div class="progress-step" data-state="0">Created</div>
        <div class="progress-step" data-state="1">Seconded</div>
        <div class="progress-step" data-state="2">Voting</div>
        <div class="progress-step" data-state="3">Result</div>
      </div>
      
      <!-- Large Vote Counts -->
      <div class="vote-display" id="voteDisplay">
        <div class="vote-cell yes">
          <div class="count" id="yesCount">0</div>
          <div class="label">Yes</div>
        </div>
        <div class="vote-cell no">
          <div class="count" id="noCount">0</div>
          <div class="label">No</div>
        </div>
        <div class="vote-cell abstain">
          <div class="count" id="abstainCount">0</div>
          <div class="label">Abstain</div>
        </div>
      </div>
      
      <!-- Voter Status -->
      <div class="voter-status eligible" id="voterStatusBanner">
        You are an eligible voter
      </div>
      
      <!-- Chair Actions -->
      <div class="chair-actions" id="chairActions">
        <h4>Chair Actions</h4>
        <button class="action-btn primary" id="btnSecond" onclick="secondProposal()" disabled>Second Motion</button>
        <button class="action-btn primary" id="btnOpenVoting" onclick="openVoting()" disabled>Open Voting — 3 Days</button>
        <button class="action-btn secondary" id="btnSetVotingDuration" onclick="openVotingCustom()" disabled>Open Voting — Custom</button>
        <button class="action-btn success" id="btnFinalize" onclick="finalizeProposal()" disabled>Finalize Proposal</button>
      </div>
      
      <!-- Amendments -->
      <div class="amendments-section" id="amendmentsSection">
        <h4>Amendments</h4>
        <div id="amendmentList"></div>
        <input type="text" id="amendmentText" placeholder="Submit amendment..." style="width:100%;margin-top:0.75rem;padding:0.75rem;border:1px solid var(--fw-border);border-radius:8px;font-size:0.9rem;" />
        <button class="action-btn secondary" style="margin-top:0.5rem;padding:0.75rem;font-size:0.9rem;" onclick="submitAmendment()" id="btnSubmitAmendment" disabled>Submit Amendment</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = '0xb3254AB74e5103F7374eEcDb57078eB10388CaC3';
    const ROB_RULES_ABI = [
      "function proposalCount() view returns (uint256)",
      "function getProposal(uint256 _proposalId) view returns (string, address, uint256, uint256, uint256, uint256, uint256, uint256, uint256, uint256, uint256)",
      "function getAmendment(uint256 _proposalId, uint256 _amendmentId) view returns (string, address, bool, uint256, uint256, uint256)",
      "function isEligible(address _user) view returns (bool)",
      "function hasVoted(uint256 _proposalId, address _voter) view returns (bool)",
      "function chair() view returns (address)",
      "function createProposal(string calldata _description) returns (uint256)",
      "function secondProposal(uint256 _proposalId)",
      "function openVoting(uint256 _proposalId, uint256 _duration)",
      "function submitAmendment(uint256 _proposalId, string calldata _description) returns (uint256)",
      "function approveAmendment(uint256 _proposalId, uint256 _amendmentId)",
      "function voteOnMotion(uint256 _proposalId, uint256 _choice, bytes32 _nullifierHash, bytes32[8] calldata)",
      "function finalizeProposal(uint256 _proposalId)",
      "function addVoter(address _voter)"
    ];
    
    const STATES = ['Created', 'Seconded', 'Voting', 'Passed', 'Failed'];
    
    let provider, signer, contract, userAddress, currentProposalId = null;
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showToast('Please install MetaMask', true);
        return;
      }
      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ROB_RULES_ABI, signer);
        
        const network = await provider.getNetwork();
        if (network.chainId.toString() !== '11155111') {
          showToast('Switch to Sepolia testnet', true);
          return;
        }
        
        document.getElementById('contractAddr').textContent = CONTRACT_ADDRESS.slice(0,10) + '...' + CONTRACT_ADDRESS.slice(-6);
        document.getElementById('chairAddr').textContent = userAddress.slice(0,8) + '...' + userAddress.slice(-6);
        
        await checkVoterStatus();
        await loadProposals();
      } catch (err) {
        showToast('Error: ' + (err.reason || err.message), true);
      }
    }
    
    async function checkVoterStatus() {
      const eligible = await contract.isEligible(userAddress);
      const banner = document.getElementById('voterStatusBanner');
      if (eligible) {
        banner.className = 'voter-status eligible';
        banner.textContent = 'You are an eligible voter';
      } else {
        banner.className = 'voter-status not-eligible';
        banner.textContent = 'Not registered — Ask chair to add you';
      }
    }
    
    async function loadProposals() {
      const count = parseInt((await contract.proposalCount()).toString());
      document.getElementById('proposalCount').textContent = count;
      const list = document.getElementById('proposalsList');
      
      if (count === 0) {
        list.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--fw-gray);font-size:1.25rem;">No proposals yet. Create one above.</div>';
        return;
      }
      
      list.innerHTML = '';
      for (let i = count - 1; i >= 0; i--) {
        const p = await contract.getProposal(i);
        const state = parseInt(p[2]);
        const card = document.createElement('div');
        card.className = 'proposal-card' + (currentProposalId === i ? ' selected' : '');
        card.onclick = () => selectProposal(i);
        card.innerHTML = `
          <div class="proposal-header">
            <span class="proposal-id">Proposal #${i}</span>
            <span class="state-badge state-${state}">${STATES[state]}</span>
          </div>
          <div class="proposal-desc">${p[0]}</div>
          <div class="proposal-stats">
            <span>Yes: <strong>${p[7]}</strong></span>
            <span>No: <strong>${p[8]}</strong></span>
            <span>Abstain: <strong>${p[9]}</strong></span>
          </div>
        `;
        list.appendChild(card);
      }
    }
    
    async function selectProposal(id) {
      currentProposalId = id;
      await loadProposalDetail(id);
      loadProposals();
    }
    
    async function loadProposalDetail(id) {
      const p = await contract.getProposal(id);
      const state = parseInt(p[2]);
      const isChair = (await contract.chair()).toLowerCase() === userAddress.toLowerCase();
      
      document.getElementById('detailTitle').textContent = `Proposal #${id}`;
      document.getElementById('detailMeta').textContent = `Chair: ${p[1].slice(0,10)}... | Created: ${new Date(parseInt(p[3])*1000).toLocaleDateString()}`;
      document.getElementById('yesCount').textContent = p[7];
      document.getElementById('noCount').textContent = p[8];
      document.getElementById('abstainCount').textContent = p[9];
      
      // Update progress bar
      document.querySelectorAll('.progress-step').forEach((el, idx) => {
        el.classList.remove('active', 'done');
        if (idx < state) el.classList.add('done');
        else if (idx === state) el.classList.add('active');
      });
      
      // Enable/disable buttons based on state + isChair
      const btnSecond = document.getElementById('btnSecond');
      const btnOpenVoting = document.getElementById('btnOpenVoting');
      const btnSetVotingDuration = document.getElementById('btnSetVotingDuration');
      const btnFinalize = document.getElementById('btnFinalize');
      const btnSubmitAmendment = document.getElementById('btnSubmitAmendment');
      
      btnSecond.disabled = !isChair || state !== 0;
      btnOpenVoting.disabled = !isChair || state !== 1;
      btnSetVotingDuration.disabled = !isChair || state !== 1;
      btnFinalize.disabled = state !== 2;
      btnSubmitAmendment.disabled = state < 2;
      
      // Load amendments
      await loadAmendments(id, state, isChair);
    }
    
    async function loadAmendments(proposalId, state, isChair) {
      const p = await contract.getProposal(proposalId);
      const count = parseInt(p[10].toString());
      const list = document.getElementById('amendmentList');
      
      if (count === 0) {
        list.innerHTML = '<div style="color:var(--fw-gray);font-size:0.9rem;">No amendments submitted</div>';
        return;
      }
      
      list.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const a = await contract.getAmendment(proposalId, i);
        const item = document.createElement('div');
        item.className = 'amendment-item';
        item.innerHTML = `
          <span class="desc">${a[0]}</span>
          <span class="status ${a[2] ? 'approved' : 'pending'}">${a[2] ? 'Approved' : 'Pending'}</span>
        `;
        if (isChair && !a[2] && state === 1) {
          item.innerHTML += `<button style="padding:0.5rem 1rem;font-size:0.8rem;cursor:pointer;" onclick="approveAmendment(${proposalId},${i})">Approve</button>`;
        }
        list.appendChild(item);
      }
    }
    
    async function createProposal() {
      const text = document.getElementById('newProposalText').value.trim();
      if (!text) { showToast('Enter proposal text', true); return; }
      try {
        const tx = await contract.createProposal(text);
        await tx.wait();
        document.getElementById('newProposalText').value = '';
        showToast('Proposal created');
        await loadProposals();
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    async function secondProposal() {
      if (currentProposalId === null) return;
      try {
        showToast('Seconding...');
        const tx = await contract.secondProposal(currentProposalId);
        await tx.wait();
        showToast('Proposal seconded');
        await loadProposalDetail(currentProposalId);
        await loadProposals();
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    async function openVoting() {
      if (currentProposalId === null) return;
      try {
        const duration = 3 * 24 * 60 * 60;
        showToast('Opening voting for 3 days...');
        const tx = await contract.openVoting(currentProposalId, duration);
        await tx.wait();
        showToast('Voting is now open');
        await loadProposalDetail(currentProposalId);
        await loadProposals();
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    async function openVotingCustom() {
      const days = prompt('Enter voting duration in days:', '3');
      if (!days) return;
      const duration = parseInt(days) * 24 * 60 * 60;
      if (duration < 60 || duration > 7 * 24 * 60 * 60) {
        showToast('Duration must be between 1 minute and 7 days', true);
        return;
      }
      if (currentProposalId === null) return;
      try {
        showToast(`Opening voting for ${days} days...`);
        const tx = await contract.openVoting(currentProposalId, duration);
        await tx.wait();
        showToast('Voting is now open');
        await loadProposalDetail(currentProposalId);
        await loadProposals();
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    async function submitAmendment() {
      if (currentProposalId === null) return;
      const text = document.getElementById('amendmentText').value.trim();
      if (!text) { showToast('Enter amendment text', true); return; }
      try {
        showToast('Submitting amendment...');
        const tx = await contract.submitAmendment(currentProposalId, text);
        await tx.wait();
        document.getElementById('amendmentText').value = '';
        showToast('Amendment submitted');
        await loadProposalDetail(currentProposalId);
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    async function approveAmendment(proposalId, amendmentId) {
      try {
        const tx = await contract.approveAmendment(proposalId, amendmentId);
        await tx.wait();
        showToast('Amendment approved');
        await loadProposalDetail(currentProposalId);
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    async function finalizeProposal() {
      if (currentProposalId === null) return;
      try {
        showToast('Finalizing...');
        const tx = await contract.finalizeProposal(currentProposalId);
        await tx.wait();
        showToast('Proposal finalized');
        await loadProposalDetail(currentProposalId);
        await loadProposals();
      } catch (err) {
        showToast(err.reason || err.message, true);
      }
    }
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 5000);
    }
    
    // Listen for new proposals
    contract.on("ProposalCreated", async () => {
      await loadProposals();
    });
    contract.on("MotionVoted", async () => {
      if (currentProposalId !== null) await loadProposalDetail(currentProposalId);
      await loadProposals();
    });
    contract.on("ProposalFinalized", async () => {
      await loadProposalDetail(currentProposalId);
      await loadProposals();
    });
    
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.on('accountsChanged', () => location.reload());
    }
    
    connectWallet();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
