<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#030816">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Registration — ZK Voting</title>
  <style>
    :root {
      --bg-primary: #030816;
      --bg-card: #0c1b3d;
      --accent-blue: #2563eb;
      --accent-light: #5BA2F1;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --fw-border: #1D335F;
      --state-voting: #4ADE80;
      --state-failed: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--fw-border);
      border-radius: 16px;
      padding: 3rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }
    .addr {
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--accent-light);
      background: var(--bg-primary);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--fw-border);
      word-break: break-all;
      margin-bottom: 2rem;
    }
    .status {
      padding: 1rem 2rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status.eligible { background: rgba(74,222,128,0.15); color: var(--state-voting); border: 2px solid var(--state-voting); }
    .status.not-eligible { background: rgba(239,68,68,0.15); color: var(--state-failed); border: 2px solid var(--state-failed); }
    .info { margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }
    .info strong { color: var(--text-primary); }
    .contract-info { margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-secondary); }
    .contract-info code { color: var(--accent-light); }
    .connect-btn {
      background: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 2rem;
    }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Voter Registration Status</h1>
    <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    <div class="addr" id="walletAddress" style="display:none;"></div>
    <div class="status not-eligible" id="statusBanner" style="display:none;"></div>
    <div class="info" id="infoText">
      Connect your wallet to check your voter eligibility status.
      If you are not registered, contact the chair to be added to the voter allowlist.
    </div>
    <div class="contract-info">
      Contract: <code id="contractAddr"></code>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = '0xb3254AB74e5103F7374eEcDb57078eB10388CaC3';
    const ABI = [
      "function isEligible(address _user) view returns (bool)",
      "function chair() view returns (address)"
    ];
    
    let provider, signer, contract, userAddress;
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('Install MetaMask to use this application');
        return;
      }
      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        
        const network = await provider.getNetwork();
        if (network.chainId.toString() !== '11155111') {
          alert('Switch to Sepolia testnet');
          return;
        }
        
        document.getElementById('connectBtn').textContent = 'Connected';
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('walletAddress').style.display = 'block';
        document.getElementById('walletAddress').textContent = userAddress;
        document.getElementById('contractAddr').textContent = CONTRACT_ADDRESS;
        
        await checkStatus();
      } catch (err) {
        alert('Error: ' + (err.reason || err.message));
      }
    }
    
    async function checkStatus() {
      const eligible = await contract.isEligible(userAddress);
      const banner = document.getElementById('statusBanner');
      banner.style.display = 'block';
      
      if (eligible) {
        banner.className = 'status eligible';
        banner.textContent = 'Eligible Voter';
        document.getElementById('infoText').innerHTML = '<strong>You are registered to vote.</strong><br><br>Go to the Voter Portal to create proposals, vote on motions, and participate in governance.';
      } else {
        banner.className = 'status not-eligible';
        banner.textContent = 'Not Registered';
        document.getElementById('infoText').innerHTML = '<strong>You are not on the voter allowlist.</strong><br><br>Contact the chair to request being added to the voter allowlist.';
      }
    }
    
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.on('accountsChanged', () => location.reload());
    }
  </script>
</body>
</html>
