<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZK DID Voting Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 2rem; }
    
    .connect-section {
      text-align: center;
      margin-bottom: 2rem;
    }
    .connect-btn {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .connect-btn:hover { transform: scale(1.02); }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .wallet-info {
      background: rgba(255,255,255,0.1);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      text-align: center;
    }
    
    .voters-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .voters-section h2 { margin-bottom: 1rem; color: #4ade80; }
    .voter-list { display: flex; gap: 1rem; flex-wrap: wrap; }
    .voter {
      background: rgba(255,255,255,0.1);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .voter:hover { background: rgba(255,255,255,0.15); }
    .voter.selected { border-color: #4ade80; background: rgba(74, 222, 128, 0.2); }
    .voter .status {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }
    .voter.voted .status { color: #f87171; }
    
    .ballot-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .ballot-section h2 { margin-bottom: 1rem; color: #60a5fa; }
    .ballot-status { 
      text-align: center; 
      padding: 1rem; 
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .vote-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      margin-bottom: 0.5rem;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .vote-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); transform: scale(1.01); }
    .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .results-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .results-section h2 { margin-bottom: 1rem; color: #f472b6; }
    .results { display: flex; flex-direction: column; gap: 0.75rem; }
    .result-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .result-label { width: 150px; }
    .result-track { flex: 1; background: rgba(255,255,255,0.1); height: 30px; border-radius: 15px; overflow: hidden; }
    .result-fill { height: 100%; transition: width 0.3s; border-radius: 15px; }
    .result-count { width: 50px; text-align: right; }
    
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #4ade80;
      color: #000;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #f87171; color: #fff; }
    
    .connection-status {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .connected { background: #4ade80; color: #000; }
    .disconnected { background: #f87171; color: #fff; }
    
    .contract-info {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      margin-top: 2rem;
    }
    .contract-info a { color: #60a5fa; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .live-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }
    
    .tx-hash {
      font-family: monospace;
      font-size: 0.8rem;
      word-break: break-all;
      margin-top: 0.5rem;
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="connection-status disconnected" id="connectionStatus">Disconnected</div>
  
  <div class="container">
    <h1>🗳️ ZK DID Voting</h1>
    <p class="subtitle">Fort Worth DAO — Blockchain Voting on Sepolia</p>
    
    <div class="connect-section">
      <button class="connect-btn" id="connectBtn">Connect Wallet</button>
    </div>
    
    <div class="wallet-info" id="walletInfo" style="display: none;">
      <div>Connected: <span id="walletAddress"></span></div>
      <div>Network: <span id="networkName">Sepolia Testnet</span></div>
    </div>
    
    <div class="ballot-section">
      <h2>Cast Your Vote</h2>
      <div class="ballot-status" id="ballotStatus">Connect wallet to vote</div>
      <button class="vote-btn" id="voteYes" disabled>✅ Yes</button>
      <button class="vote-btn" id="voteNo" disabled>❌ No</button>
      <button class="vote-btn" id="voteAbstain" disabled>➖ Abstain</button>
      <div id="txHash" class="tx-hash" style="display: none;"></div>
    </div>
    
    <div class="results-section">
      <h2><span class="live-indicator"></span>Live Results</h2>
      <div class="results">
        <div class="result-bar">
          <span class="result-label">✅ Yes</span>
          <div class="result-track"><div class="result-fill" id="yesBar" style="background: #4ade80; width: 0%"></div></div>
          <span class="result-count" id="yesCount">0</span>
        </div>
        <div class="result-bar">
          <span class="result-label">❌ No</span>
          <div class="result-track"><div class="result-fill" id="noBar" style="background: #f87171; width: 0%"></div></div>
          <span class="result-count" id="noCount">0</span>
        </div>
        <div class="result-bar">
          <span class="result-label">➖ Abstain</span>
          <div class="result-track"><div class="result-fill" id="abstainBar" style="background: #94a3b8; width: 0%"></div></div>
          <span class="result-count" id="abstainCount">0</span>
        </div>
      </div>
      <p style="margin-top: 1rem; color: #666; font-size: 0.9rem;">
        Total Votes: <span id="totalVotes">0</span> | Blockchain: Sepolia
      </p>
    </div>
    
    <div class="contract-info">
      <p>Contract: <a href="https://sepolia.etherscan.io/address/0xb5a5Dd671e70df618c9694541e7F1e4E66b1a88e" target="_blank">0xb5a5Dd671e70df618c9694541e7F1e4E66b1a88e</a></p>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    // Contract configuration
    const CONTRACT_ADDRESS = '0xb5a5Dd671e70df618c9694541e7F1e4E66b1a88e';
    const CONTRACT_ABI = [
      "function vote(uint256 _choice, bytes32 _nullifierHash, bytes32[8] calldata _proof) external",
      "function getVoteCount(uint256 _choice) external view returns (uint256)",
      "function getTotalVotes() external view returns (uint256)",
      "function choiceCount() external view returns (uint256)",
      "event VoteCast(address voter, uint256 choice, bytes32 nullifierHash)"
    ];
    
    // State
    let provider;
    let signer;
    let contract;
    let userAddress = null;
    let votedChoices = new Set();
    
    // DOM elements
    const connectBtn = document.getElementById('connectBtn');
    const walletInfo = document.getElementById('walletInfo');
    const walletAddress = document.getElementById('walletAddress');
    const ballotStatus = document.getElementById('ballotStatus');
    const voteYes = document.getElementById('voteYes');
    const voteNo = document.getElementById('voteNo');
    const voteAbstain = document.getElementById('voteAbstain');
    const txHashDiv = document.getElementById('txHash');
    const toast = document.getElementById('toast');
    const connectionStatus = document.getElementById('connectionStatus');
    
    // Connect wallet
    async function connectWallet() {
      try {
        if (typeof window.ethereum === 'undefined') {
          showToast('Please install MetaMask!', true);
          return;
        }
        
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        
        // Check network
        const network = await provider.getNetwork();
        if (network.chainId !== 11155111n) {
          showToast('Please switch to Sepolia testnet!', true);
          return;
        }
        
        // Initialize contract
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        
        // Update UI
        walletAddress.textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        walletInfo.style.display = 'block';
        connectBtn.textContent = 'Connected';
        connectBtn.disabled = true;
        
        ballotStatus.textContent = 'Connected! Cast your vote.';
        voteYes.disabled = false;
        voteNo.disabled = false;
        voteAbstain.disabled = false;
        
        connectionStatus.textContent = '🟢 Connected';
        connectionStatus.className = 'connection-status connected';
        
        // Load current results
        await updateResults();
        
        // Listen for votes
        contract.on("VoteCast", (voter, choice, nullifierHash, event) => {
          updateResults();
          if (voter.toLowerCase() === userAddress.toLowerCase()) {
            votedChoices.add(choice.toNumber());
            showToast('Vote confirmed on blockchain!');
          }
        });
        
      } catch (err) {
        console.error(err);
        showToast('Error: ' + err.message, true);
      }
    }
    
    // Cast vote
    async function castVote(choice) {
      if (!contract || !signer) {
        showToast('Please connect wallet first!', true);
        return;
      }
      
      const btn = choice === 0 ? voteYes : choice === 1 ? voteNo : voteAbstain;
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '⏳ Confirm in wallet...';
      
      try {
        // Generate nullifier hash
        const nullifierHash = ethers.utils.keccak256(
          ethers.utils.randomBytes(32)
        );
        
        // Empty proof for now (simplified)
        const proof = [
          ethers.constants.HashZero,
          ethers.constants.HashZero,
          ethers.constants.HashZero,
          ethers.constants.HashZero,
          ethers.constants.HashZero,
          ethers.constants.HashZero,
          ethers.constants.HashZero,
          ethers.constants.HashZero
        ];
        
        // Send transaction
        const tx = await contract.vote(choice, nullifierHash, proof);
        
        btn.textContent = '⏳ Mining...';
        txHashDiv.style.display = 'block';
        txHashDiv.textContent = `Tx: ${tx.hash}`;
        
        await tx.wait();
        
        showToast('✅ Vote recorded on blockchain!');
        votedChoices.add(choice);
        
        await updateResults();
        
        btn.textContent = '✓ Voted!';
        
      } catch (err) {
        console.error(err);
        showToast('Error: ' + (err.reason || err.message), true);
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }
    
    // Update results from contract
    async function updateResults() {
      if (!contract) return;
      
      try {
        const yes = await contract.getVoteCount(0);
        const no = await contract.getVoteCount(1);
        const abstain = await contract.getVoteCount(2);
        
        const total = yes.add(no).add(abstain);
        const max = total.gt(0) ? total : ethers.constants.One;
        
        document.getElementById('yesCount').textContent = yes.toString();
        document.getElementById('noCount').textContent = no.toString();
        document.getElementById('abstainCount').textContent = abstain.toString();
        
        document.getElementById('yesBar').style.width = yes.mul(100).div(max).toString() + '%';
        document.getElementById('noBar').style.width = no.mul(100).div(max).toString() + '%';
        document.getElementById('abstainBar').style.width = abstain.mul(100).div(max).toString() + '%';
        
        document.getElementById('totalVotes').textContent = total.toString();
        
      } catch (err) {
        console.error('Error fetching results:', err);
      }
    }
    
    // Show toast
    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 5000);
    }
    
    // Event listeners
    connectBtn.addEventListener('click', connectWallet);
    voteYes.addEventListener(() => castVote(0));
    voteNo.addEventListener(() => castVote(1));
    voteAbstain.addEventListener(() => castVote(2));
    
    // Check if already connected
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length === 0) {
          location.reload();
        }
      });
      
      window.ethereum.on('chainChanged', () => {
        location.reload();
      });
    }
  </script>
</body>
</html>
