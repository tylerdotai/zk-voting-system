<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Portal — Rob's Rules Voting</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 1rem;
    }
    .container { max-width: 700px; margin: 0 auto; }
    
    h1 { text-align: center; margin-bottom: 0.25rem; font-size: 1.5rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
    
    /* Wallet Section */
    .wallet-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255,255,255,0.05);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
    }
    .connect-btn {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #walletAddress { color: #94a3b8; font-size: 0.85rem; }
    #walletInfo { display: none; }
    
    /* Voter Status Banner */
    .voter-status {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
      text-align: center;
    }
    .voter-status.eligible {
      background: rgba(74, 222, 128, 0.2);
      border: 1px solid #4ade80;
      color: #4ade80;
    }
    .voter-status.not-eligible {
      background: rgba(248, 113, 113, 0.2);
      border: 1px solid #f87171;
      color: #f87171;
    }
    .action-btn {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .action-btn:hover { opacity: 0.85; }
    
    /* Proposal Cards */
    .proposals-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
    }
    .proposal-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }
    .proposal-card:hover { border-color: rgba(74, 222, 128, 0.4); transform: translateY(-1px); }
    .proposal-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem; }
    .proposal-id { font-size: 0.75rem; color: #64748b; }
    .proposal-desc { font-size: 0.95rem; color: #e2e8f0; margin-bottom: 0.5rem; }
    .proposal-meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: #64748b; }
    .state-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .state-created { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
    .state-seconded { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .state-voting { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .state-passed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .state-failed { background: rgba(248, 113, 113, 0.2); color: #f87171; }
    
    /* Vote Section (shown when card clicked) */
    .vote-section {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 12px;
      padding: 1.25rem;
      margin: 1rem 0;
    }
    .vote-section h3 { font-size: 1rem; margin-bottom: 1rem; }
    .vote-buttons { display: flex; gap: 0.75rem; }
    .vote-btn {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .vote-btn.yes { background: #22c55e; color: #fff; }
    .vote-btn.no { background: #ef4444; color: #fff; }
    .vote-btn.abstain { background: #64748b; color: #fff; }
    .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .vote-btn:hover:not(:disabled) { transform: scale(1.03); }
    .close-btn {
      background: none;
      border: 1px solid #64748b;
      color: #94a3b8;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 0.75rem;
    }
    .close-btn:hover { border-color: #94a3b8; color: #e2e8f0; }
    
    .votes-display {
      display: flex;
      justify-content: space-around;
      margin: 0.75rem 0;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .votes-display span { text-align: center; }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #64748b;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toast.show { opacity: 1; }
    .toast.error { border-color: #f87171; }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗳️ Voter Portal</h1>
    <p class="subtitle">Rob's Rules Parliamentary Voting</p>
    
    <!-- Wallet Bar -->
    <div class="wallet-bar">
      <button class="connect-btn" id="connectBtn">Connect Wallet</button>
      <div id="walletInfo">
        <span id="walletAddress"></span>
      </div>
    </div>
    
    <!-- Voter Status -->
    <div class="voter-status" id="voterStatusBanner"></div>
    
    <!-- Proposals List -->
    <div class="proposals-title">Active Proposals</div>
    <div id="proposalsList">
      <div class="empty-state">
        <div class="emoji">📋</div>
        <div>No proposals yet</div>
        <div style="font-size: 0.8rem; margin-top: 0.5rem;">The chair will create proposals for voting.</div>
      </div>
    </div>
    
    <!-- Vote Section (shown when proposal selected) -->
    <div class="vote-section hidden" id="voteSection">
      <h3 id="selectedProposalTitle">Proposal #0</h3>
      <div class="votes-display">
        <span>👍 Yes: <strong id="voteYesCount">0</strong></span>
        <span>👎 No: <strong id="voteNoCount">0</strong></span>
        <span>➡️ Abstain: <strong id="voteAbstainCount">0</strong></span>
      </div>
      <div id="votingControls">
        <div class="vote-buttons">
          <button class="vote-btn yes" id="btnYes" onclick="castVote(0)">Yes</button>
          <button class="vote-btn no" id="btnNo" onclick="castVote(1)">No</button>
          <button class="vote-btn abstain" id="btnAbstain" onclick="castVote(2)">Abstain</button>
        </div>
      </div>
      <div id="voteStatus" style="font-size: 0.85rem; color: #94a3b8; margin-top: 0.75rem;"></div>
      <button class="close-btn" onclick="closeVoteSection()">Close</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    // ============ CONFIG ============
    const CONTRACT_ADDRESS = '0xb3254AB74e5103F7374eEcDb57078eB10388CaC3';
    const CONTRACT_ABI = [
      "function proposalCount() view returns (uint256)",
      "function getProposal(uint256 _proposalId) view returns (string, address, uint256, uint256, uint256, uint256, uint256, uint256, uint256, uint256, uint256)",
      "function isEligible(address _user) view returns (bool)",
      "function hasVoted(uint256 _proposalId, address _voter) view returns (bool)",
      "function voteOnMotion(uint256 _proposalId, uint256 _choice, bytes32 _nullifierHash, bytes32[8] calldata)",
      "function choiceCount() view returns (uint256)",
      "event ProposalCreated(uint256 indexed proposalId, string description, address indexed chair)",
      "event MotionVoted(uint256 indexed proposalId, uint256 choice, address indexed voter)"
    ];
    
    const STATES = ['Created', 'Seconded', 'Voting', 'Passed', 'Failed'];
    const STATE_CLASSES = ['state-created', 'state-seconded', 'state-voting', 'state-passed', 'state-failed'];
    const STATE_TO_INDEX = { Created: 0, Seconded: 1, Voting: 2, Passed: 3, Failed: 4 };
    
    // State
    let provider, signer, contract, userAddress;
    let selectedProposalId = null;
    let selectedProposalState = null;
    
    // ============ WALLET ============
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showToast('Please install MetaMask!', true);
        return;
      }
      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        
        const network = await provider.getNetwork();
        if (network.chainId.toString() !== '11155111') {
          showToast('Please switch to Sepolia testnet!', true);
          return;
        }
        
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        
        document.getElementById('walletAddress').textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        document.getElementById('walletInfo').style.display = 'flex';
        document.getElementById('connectBtn').textContent = 'Connected';
        document.getElementById('connectBtn').disabled = true;
        
        await checkVoterStatus();
        await loadProposals();
        
        // Listen for new votes
        contract.on("MotionVoted", async () => {
          if (selectedProposalId !== null) {
            await refreshSelectedProposal();
          }
          await loadProposals();
        });
        
      } catch (err) {
        console.error(err);
        showToast('Error: ' + (err.reason || err.message), true);
      }
    }
    
    // ============ VOTER STATUS ============
    async function checkVoterStatus() {
      if (!contract || !userAddress) return;
      try {
        const eligible = await contract.isEligible(userAddress);
        const banner = document.getElementById('voterStatusBanner');
        
        if (eligible) {
          banner.style.display = 'block';
          banner.className = 'voter-status eligible';
          banner.innerHTML = '✅ You are an eligible voter';
          enableVoting();
        } else {
          banner.style.display = 'block';
          banner.className = 'voter-status not-eligible';
          banner.innerHTML = '❌ You are not registered to vote. Ask the chair to add you.';
          disableVoting();
        }
      } catch (e) {
        console.error('Error checking voter status:', e);
      }
    }
    
    function enableVoting() {
      document.querySelectorAll('.vote-btn').forEach(b => b.disabled = false);
    }
    
    function disableVoting() {
      document.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
    }
    
    // ============ LOAD PROPOSALS ============
    async function loadProposals() {
      if (!contract) return;
      try {
        const count = await contract.proposalCount();
        const list = document.getElementById('proposalsList');
        
        if (count.toString() === '0') {
          list.innerHTML = `
            <div class="empty-state">
              <div class="emoji">📋</div>
              <div>No proposals yet</div>
              <div style="font-size: 0.8rem; margin-top: 0.5rem;">The chair will create proposals for voting.</div>
            </div>`;
          return;
        }
        
        list.innerHTML = '';
        for (let i = count - 1; i >= 0; i--) {
          const p = await contract.getProposal(i);
          const state = parseInt(p[2]);
          const stateName = STATES[state] || 'Unknown';
          
          const card = document.createElement('div');
          card.className = 'proposal-card';
          card.onclick = () => selectProposal(i, state, p[0]);
          
          const timeAgoStr = p[3] > 0 ? timeAgo(parseInt(p[3])) : '—';
          
          card.innerHTML = `
            <div class="proposal-header">
              <span class="proposal-id">#${i}</span>
              <span class="state-badge ${STATE_CLASSES[state]}">${stateName}</span>
            </div>
            <div class="proposal-desc">${p[0]}</div>
            <div class="proposal-meta">
              <span>👤 ${p[1].slice(0,6)}...</span>
              <span>🗳️ ${p[7]} yes / ${p[8]} no / ${p[9]} abstain</span>
              <span>${timeAgoStr}</span>
            </div>
          `;
          
          list.appendChild(card);
        }
      } catch (e) {
        console.error('Error loading proposals:', e);
      }
    }
    
    // ============ SELECT PROPOSAL ============
    async function selectProposal(id, state, desc) {
      selectedProposalId = id;
      selectedProposalState = state;
      
      const section = document.getElementById('voteSection');
      section.classList.remove('hidden');
      document.getElementById('selectedProposalTitle').textContent = `Proposal #${id}: ${desc}`;
      
      await refreshSelectedProposal();
    }
    
    async function refreshSelectedProposal() {
      if (selectedProposalId === null || !contract) return;
      try {
        const p = await contract.getProposal(selectedProposalId);
        document.getElementById('voteYesCount').textContent = p[7];
        document.getElementById('voteNoCount').textContent = p[8];
        document.getElementById('voteAbstainCount').textContent = p[9];
        
        const state = parseInt(p[2]);
        selectedProposalState = state;
        
        const statusEl = document.getElementById('voteStatus');
        const controls = document.getElementById('votingControls');
        
        if (state === 2) {
          // Voting open
          const alreadyVoted = await contract.hasVoted(selectedProposalId, userAddress);
          if (alreadyVoted) {
            statusEl.textContent = '✅ You have already voted on this proposal.';
            controls.innerHTML = '<em style="color:#94a3b8">You have cast your vote.</em>';
          } else {
            statusEl.textContent = '';
            controls.innerHTML = `
              <div class="vote-buttons">
                <button class="vote-btn yes" id="btnYes" onclick="castVote(0)">Yes</button>
                <button class="vote-btn no" id="btnNo" onclick="castVote(1)">No</button>
                <button class="vote-btn abstain" id="btnAbstain" onclick="castVote(2)">Abstain</button>
              </div>`;
          }
        } else if (state === 0 || state === 1) {
          statusEl.textContent = '⏳ Voting is not yet open for this proposal.';
          controls.innerHTML = '<em style="color:#94a3b8">Voting has not started yet.</em>';
        } else if (state === 3) {
          statusEl.textContent = '✅ Proposal passed.';
          controls.innerHTML = '<em style="color:#4ade80">This proposal has passed.</em>';
        } else if (state === 4) {
          statusEl.textContent = '❌ Proposal failed.';
          controls.innerHTML = '<em style="color:#f87171">This proposal did not pass.</em>';
        }
        
        document.querySelectorAll('.vote-btn').forEach(b => b.disabled = false);
      } catch (e) {
        console.error('Error refreshing proposal:', e);
      }
    }
    
    // ============ CAST VOTE ============
    async function castVote(choice) {
      if (!contract || !userAddress) {
        showToast('Connect your wallet first', true);
        return;
      }
      if (selectedProposalState !== 2) {
        showToast('Voting is not open for this proposal', true);
        return;
      }
      
      const btns = document.querySelectorAll('.vote-btn');
      btns.forEach(b => { b.disabled = true; b.textContent = '⏳...'; });
      
      try {
        const nullifierHash = ethers.utils.keccak256(ethers.utils.randomBytes(32));
        const proof = [
          ethers.constants.HashZero, ethers.constants.HashZero,
          ethers.constants.HashZero, ethers.constants.HashZero,
          ethers.constants.HashZero, ethers.constants.HashZero,
          ethers.constants.HashZero, ethers.constants.HashZero
        ];
        
        const tx = await contract.voteOnMotion(selectedProposalId, choice, nullifierHash, proof);
        showToast('Transaction submitted...', false);
        
        await tx.wait();
        showToast('✅ Vote recorded!');
        await refreshSelectedProposal();
        await loadProposals();
        
        document.getElementById('voteStatus').textContent = '✅ You have already voted on this proposal.';
        document.getElementById('votingControls').innerHTML = '<em style="color:#94a3b8">You have cast your vote.</em>';
        
      } catch (err) {
        console.error(err);
        showToast('Error: ' + (err.reason || err.message), true);
        btns.forEach((b, i) => { b.disabled = false; b.textContent = ['Yes','No','Abstain'][i]; });
      }
    }
    
    function closeVoteSection() {
      document.getElementById('voteSection').classList.add('hidden');
      selectedProposalId = null;
      selectedProposalState = null;
    }
    
    // ============ HELPERS ============
    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const diff = Date.now() / 1000 - parseInt(timestamp);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 5000);
    }
    
    // Auto-connect check
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.on('accountsChanged', () => location.reload());
      window.ethereum.on('chainChanged', () => location.reload());
    }
    
    document.getElementById('connectBtn').addEventListener('click', connectWallet);
    
    // Disable voting buttons by default
    document.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(reg => console.log("SW registered:", reg.scope))
          .catch(err => console.warn("SW failed:", err));
      });
    }
  </script>
</body>
</html>
