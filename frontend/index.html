<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#ffffff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rob's Rules Voting — Voter Portal</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-primary: #030816;
      --bg-card: #0c1b3d;
      --accent-blue: #2563eb;
      --accent-light: #5BA2F1;
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --fw-border: #1D335F;
      --state-created: #9ca3af;
      --state-seconded: #f59e0b;
      --state-voting: #4ADE80;
      --state-passed: #10b981;
      --state-failed: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      background: var(--bg-card);
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      border-bottom: 1px solid var(--fw-border);
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-nav {
      display: flex;
      gap: 0.5rem;
    }
    .header-nav a {
      font-size: 0.8rem;
      color: var(--accent-light);
      text-decoration: none;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--accent-blue);
      background: rgba(37, 99, 235, 0.15);
      transition: all 0.2s;
    }
    .header-nav a:hover {
      background: rgba(37, 99, 235, 0.35);
      color: #fff;
    }
    .header .network {
      font-size: 0.75rem;
      color: var(--accent-light);
      background: rgba(37, 99, 235, 0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      border: 1px solid var(--accent-blue);
    }
    
    /* Main */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    /* Status Bar */
    .status-bar {
      background: var(--bg-card);
      border: 1px solid var(--fw-border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .connect-btn {
      background: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .wallet-addr {
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--accent-light);
    }
    
    /* Proposal Cards */
    .proposals-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    
    .proposal-card {
      background: var(--bg-card);
      border: 2px solid var(--fw-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .proposal-card:hover { border-color: var(--accent-blue); box-shadow: 0 4px 20px rgba(37, 99, 235, 0.2); }
    .proposal-card.selected { border-color: var(--accent-blue); border-width: 3px; }
    .proposal-card.voting-open { border-left: 6px solid var(--state-voting); }
    .proposal-card.closed { opacity: 0.7; }
    
    .proposal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .proposal-id {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }
    .state-badge {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.35rem 1rem;
      border-radius: 20px;
      color: #fff;
    }
    .state-0 { background: var(--state-created); }
    .state-1 { background: var(--state-seconded); }
    .state-2 { background: var(--state-voting); }
    .state-3 { background: var(--state-passed); }
    .state-4 { background: var(--state-failed); }
    
    .proposal-desc {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    
    .proposal-votes {
      display: flex;
      gap: 2.5rem;
      font-size: 1.1rem;
      color: var(--text-secondary);
    }
    .proposal-votes strong {
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text-primary);
    }
    .proposal-votes span { display: flex; align-items: baseline; gap: 0.5rem; }
    
    /* Vote Section */
    .vote-section {
      background: var(--bg-card);
      border: 2px solid var(--accent-blue);
      border-radius: 12px;
      padding: 2rem;
      margin: 1.5rem 0;
    }
    .vote-section h3 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    
    /* Large Vote Counts */
    .vote-display {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .vote-cell {
      background: var(--bg-primary);
      border: 1px solid var(--fw-border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .vote-cell .count {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
    }
    .vote-cell .label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .vote-cell.yes .count { color: var(--state-passed); }
    .vote-cell.no .count { color: var(--state-failed); }
    .vote-cell.abstain .count { color: var(--accent-light); }
    
    /* Vote Buttons — BIG AND READABLE */
    .vote-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .vote-btn {
      padding: 1.5rem;
      font-size: 1.25rem;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }
    .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .vote-btn.yes { background: var(--state-voting); color: #030816; }
    .vote-btn.yes:hover:not(:disabled) { background: #22c55e; transform: translateY(-2px); }
    .vote-btn.no { background: var(--state-failed); color: #fff; }
    .vote-btn.no:hover:not(:disabled) { background: #dc2626; transform: translateY(-2px); }
    .vote-btn.abstain { background: var(--accent-blue); color: #fff; }
    .vote-btn.abstain:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-2px); }
    
    .vote-status {
      text-align: center;
      font-size: 1rem;
      color: var(--text-secondary);
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--fw-border);
    }
    
    .close-btn {
      background: var(--bg-primary);
      border: 1px solid var(--fw-border);
      color: var(--text-secondary);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    .close-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    .empty-state h3 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-primary); }
    .empty-state p { font-size: 1.1rem; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-blue);
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--state-failed); }
    
    /* TX Notification */
    #txBanner {
      position: fixed;
      top: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 2px solid var(--state-voting);
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      z-index: 200;
      display: none;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(74, 222, 128, 0.15);
    }
    #txBanner.show { display: block; }
    #txBanner .tx-label { color: var(--state-voting); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    #txBanner .tx-hash { color: var(--accent-light); font-family: monospace; font-size: 0.8rem; margin-top: 0.25rem; word-break: break-all; }
    #txBanner .tx-link { color: var(--accent-light); text-decoration: underline; font-size: 0.8rem; }
    #txBanner .tx-status { color: var(--state-voting); font-size: 0.8rem; margin-top: 0.25rem; }
    
    .hidden { display: none; }
    
    @media (min-width: 900px) {
      .proposal-desc { font-size: 1.75rem; }
      .vote-cell .count { font-size: 5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>Rob's Rules Voting — Voter Portal</h1>
      <nav class="header-nav">
        <a href="index.html">Voter Portal</a>
        <a href="rob-rules.html">Chair Dashboard</a>
      </nav>
    </div>
    <span class="network">Sepolia Testnet</span>
  </div>
  
  <div class="main">
    <!-- Status Bar -->
    <div class="status-bar">
      <div class="wallet-section">
        <button class="connect-btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        <span class="wallet-addr" id="walletAddress" style="display:none;"></span>
      </div>
    </div>
    
    <!-- Proposals -->
    <div class="proposals-title">Active Proposals</div>
    <div id="proposalsList">
      <div class="empty-state">
        <h3>No Proposals Yet</h3>
        <p>The chair will create proposals for voting.</p>
      </div>
    </div>
    
    <!-- Vote Section -->
    <div class="vote-section hidden" id="voteSection">
      <h3 id="selectedProposalTitle">Proposal #0</h3>
      <div class="vote-display">
        <div class="vote-cell yes">
          <div class="count" id="voteYesCount">0</div>
          <div class="label">Yes</div>
        </div>
        <div class="vote-cell no">
          <div class="count" id="voteNoCount">0</div>
          <div class="label">No</div>
        </div>
        <div class="vote-cell abstain">
          <div class="count" id="voteAbstainCount">0</div>
          <div class="label">Abstain</div>
        </div>
      </div>
      <div id="votingControls">
        <div class="vote-buttons">
          <button class="vote-btn yes" onclick="castVote(0)">Yes</button>
          <button class="vote-btn no" onclick="castVote(1)">No</button>
          <button class="vote-btn abstain" onclick="castVote(2)">Abstain</button>
        </div>
      </div>
      <div class="vote-status" id="voteStatus"></div>
      <button class="close-btn" onclick="closeVoteSection()">Close</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  <div id="txBanner">
    <div class="tx-label" id="txLabel">Transaction Submitted</div>
    <div class="tx-hash" id="txHash"></div>
    <a class="tx-link" id="txLink" href="#" target="_blank">View on Etherscan ↗</a>
    <div class="tx-status" id="txStatus">Waiting for confirmation...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = '0x198041e195b9e8c34B5371edF67Ec84DFa68bb74';
    const CONTRACT_ABI = [
      "function proposalCount() view returns (uint256)",
      "function getProposal(uint256 _proposalId) view returns (string, address, uint256, uint256, uint256, uint256, uint256, uint256, uint256, uint256, uint256)",
      "function hasVoted(uint256 _proposalId, address _voter) view returns (bool)",
      "function voteOnMotion(uint256 _proposalId, uint256 _choice, bytes32 _nullifierHash, bytes32[8] calldata)",
      "event MotionVoted(uint256 indexed proposalId, uint256 choice, address indexed voter)"
    ];
    
    const STATES = ['Created', 'Seconded', 'Voting', 'Passed', 'Failed'];
    
    let provider, signer, contract, userAddress;
    let selectedProposalId = null;
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showToast('Install MetaMask to use this application', true);
        return;
      }
      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        
        const network = await provider.getNetwork();
        if (network.chainId.toString() !== '11155111') {
          try {
            await window.ethereum.request({
              method: 'wallet_switchEthereumChain',
              params: [{ chainId: '0xaa36a7' }],
            });
            const newNetwork = await provider.getNetwork();
            if (newNetwork.chainId.toString() !== '11155111') {
              showToast('Please switch to Sepolia testnet manually', true);
              return;
            }
          } catch (switchErr) {
            showToast('Please switch to Sepolia testnet', true);
            return;
          }
        }
        
        document.getElementById('walletAddress').style.display = 'inline';
        document.getElementById('walletAddress').textContent = userAddress.slice(0,8) + '...' + userAddress.slice(-6);
        document.getElementById('connectBtn').textContent = 'Connected';
        document.getElementById('connectBtn').disabled = true;
        
        await loadProposals();
        
        contract.on("MotionVoted", async () => {
          if (selectedProposalId !== null) await refreshSelectedProposal();
          await loadProposals();
        });

        // SSE — live updates for all browsers (no MetaMask needed)
        const SSE_BASE = 'https://mai-instead-north-part.trycloudflare.com';
        let sseConn = null;
        function connectSSE() {
          if (!sseConn || sseConn.readyState === EventSource.CLOSED) {
            sseConn = new EventSource(`${SSE_BASE}/events`);
            sseConn.onmessage = async (e) => {
              const { event, data } = JSON.parse(e.data);
              if (event === 'connected' || event === 'ws_disconnected') return;
              if (['MotionVoted', 'ProposalCreated', 'ProposalFinalized'].includes(event)) {
                if (selectedProposalId !== null) await refreshSelectedProposal();
                await loadProposals();
              }
            };
            sseConn.onerror = () => { sseConn.close(); setTimeout(connectSSE, 5000); };
          }
        }
        connectSSE();
      } catch (err) {
        showToast('Error: ' + (err.reason || err.message), true);
      }
    }
    
    async function loadProposals() {
      if (!contract) return;
      const count = parseInt((await contract.proposalCount()).toString());
      const list = document.getElementById('proposalsList');
      
      if (count === 0) {
        list.innerHTML = '<div class="empty-state"><h3>No Proposals Yet</h3><p>The chair will create proposals for voting.</p></div>';
        return;
      }
      
      list.innerHTML = '';
      for (let i = count - 1; i >= 0; i--) {
        const p = await contract.getProposal(i);
        const state = parseInt(p[2]);
        const card = document.createElement('div');
        const isVoting = state === 2;
        card.className = 'proposal-card' + (isVoting ? ' voting-open' : '') + (state >= 3 ? ' closed' : '');
        card.onclick = () => selectProposal(i);

        const headerDiv = document.createElement('div');
        headerDiv.className = 'proposal-header';
        const idSpan = document.createElement('span');
        idSpan.className = 'proposal-id';
        idSpan.textContent = `Proposal #${i}`;
        const badgeSpan = document.createElement('span');
        badgeSpan.className = `state-badge state-${state}`;
        badgeSpan.textContent = STATES[state];
        headerDiv.appendChild(idSpan);
        headerDiv.appendChild(badgeSpan);

        const descDiv = document.createElement('div');
        descDiv.className = 'proposal-desc';
        descDiv.textContent = p[0];

        const votesDiv = document.createElement('div');
        votesDiv.className = 'proposal-votes';
        const yesSpan = document.createElement('span');
        yesSpan.innerHTML = `Yes <strong>${p[7].toString()}</strong>`;
        const noSpan = document.createElement('span');
        noSpan.innerHTML = `No <strong>${p[8].toString()}</strong>`;
        const abstainSpan = document.createElement('span');
        abstainSpan.innerHTML = `Abstain <strong>${p[9].toString()}</strong>`;
        votesDiv.appendChild(yesSpan);
        votesDiv.appendChild(noSpan);
        votesDiv.appendChild(abstainSpan);

        card.appendChild(headerDiv);
        card.appendChild(descDiv);
        card.appendChild(votesDiv);
        list.appendChild(card);
      }
    }
    
    async function selectProposal(id) {
      selectedProposalId = id;
      const p = await contract.getProposal(id);
      const state = parseInt(p[2]);
      
      document.getElementById('voteSection').classList.remove('hidden');
      document.getElementById('selectedProposalTitle').textContent = `Proposal #${id}`;
      
      await refreshSelectedProposal();
    }
    
    async function refreshSelectedProposal() {
      if (selectedProposalId === null || !contract) return;
      const p = await contract.getProposal(selectedProposalId);
      document.getElementById('voteYesCount').textContent = p[7].toString();
      document.getElementById('voteNoCount').textContent = p[8].toString();
      document.getElementById('voteAbstainCount').textContent = p[9].toString();
      
      const state = parseInt(p[2]);
      const statusEl = document.getElementById('voteStatus');
      const controls = document.getElementById('votingControls');
      
      if (state === 2) {
        const alreadyVoted = await contract.hasVoted(selectedProposalId, userAddress);
        if (alreadyVoted) {
          statusEl.textContent = 'You have already voted on this proposal.';
          controls.innerHTML = '<div style="text-align:center;padding:1rem;font-size:1.1rem;color:var(--state-voting);font-weight:700;">Your vote has been recorded.</div>';
        } else {
          statusEl.textContent = 'Cast your vote below.';
          controls.innerHTML = '<div class="vote-buttons"><button class="vote-btn yes" onclick="castVote(0)">Yes</button><button class="vote-btn no" onclick="castVote(1)">No</button><button class="vote-btn abstain" onclick="castVote(2)">Abstain</button></div>';
        }
      } else if (state === 0 || state === 1) {
        statusEl.textContent = 'Voting has not started for this proposal.';
        controls.innerHTML = '<div style="text-align:center;padding:1rem;font-size:1.1rem;color:var(--text-secondary);">The chair will open voting soon.</div>';
      } else if (state === 3) {
        statusEl.textContent = 'This proposal has passed.';
        controls.innerHTML = '<div style="text-align:center;padding:1rem;font-size:1.1rem;color:var(--state-passed);font-weight:700;">Proposal Passed</div>';
      } else if (state === 4) {
        statusEl.textContent = 'This proposal did not pass.';
        controls.innerHTML = '<div style="text-align:center;padding:1rem;font-size:1.1rem;color:var(--state-failed);font-weight:700;">Proposal Failed</div>';
      }
    }
    
    async function castVote(choice) {
      if (!contract) {
        showToast('Connect your wallet first', true);
        return;
      }
      try {
        const nullifierHash = ethers.utils.keccak256(ethers.utils.randomBytes(32));
        const proof = [ethers.constants.HashZero,ethers.constants.HashZero,ethers.constants.HashZero,ethers.constants.HashZero,ethers.constants.HashZero,ethers.constants.HashZero,ethers.constants.HashZero,ethers.constants.HashZero];
        const tx = await contract.voteOnMotion(selectedProposalId, choice, nullifierHash, proof);
        showTx(tx.hash, 'Vote Recorded');
        await tx.wait();
        showToast('Vote recorded');
        await refreshSelectedProposal();
        await loadProposals();
      } catch (err) {
        document.getElementById('txBanner').className = '';
        showToast(err.reason || err.message, true);
      }
    }
    
    function showTx(hash, label) {
      const banner = document.getElementById('txBanner');
      document.getElementById('txLabel').textContent = label;
      document.getElementById('txHash').textContent = hash;
      document.getElementById('txLink').href = 'https://sepolia.etherscan.io/tx/' + hash;
      document.getElementById('txStatus').textContent = 'Waiting for confirmation...';
      banner.className = 'show';
      provider.once('block', () => {
        document.getElementById('txStatus').textContent = '✓ Confirmed onchain';
        setTimeout(() => banner.className = '', 4000);
      });
    }
    
    function closeVoteSection() {
      document.getElementById('voteSection').classList.add('hidden');
      selectedProposalId = null;
    }
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 5000);
    }
    
    if (typeof window.ethereum !== 'undefined') {
      window.ethereum.on('accountsChanged', () => location.reload());
    }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
